<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Train Simulator</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { margin:0; font-family:Arial; }

#map {
 height:100vh;
 z-index:1;
}

/* UI поверх карты */
.topbar, .sidebar, .bottom {
 position:absolute;
 z-index:2000;
 pointer-events:auto;
}

/* верх */
.topbar {
 top:0; left:0; right:0;
 height:50px;
 background:#222;
 display:flex;
 align-items:center;
 padding:5px;
}
.topbar button {
 margin-right:5px;
 background:#444;
 color:white;
 border:none;
 padding:6px;
 cursor:pointer;
}

/* бок */
.sidebar {
 top:50px;
 left:0;
 width:260px;
 bottom:0;
 background:#2b2b2b;
 color:white;
 padding:10px;
 overflow:auto;
}

.sidebar input, .sidebar select {
 width:100%;
 margin-bottom:5px;
 padding:5px;
}

/* низ */
.bottom {
 bottom:0;
 left:260px;
 right:0;
 height:40px;
 background:#222;
 color:white;
 display:flex;
 align-items:center;
 padding-left:10px;
}
</style>

</head>
<body>

<div class="topbar">
<button onclick="setMode('station')">Станции</button>
<button onclick="setMode('track')">Рельсы</button>
<button onclick="setMode('signal')">Светофор</button>
<button onclick="setMode('route')">Маршрут</button>
</div>

<div class="sidebar">

<h3>Станция</h3>
<input id="stationName" placeholder="Название станции">

<h3>Поезда</h3>
<select id="routeSelect"></select>
<button onclick="spawnTrain()">Создать поезд</button>
<button onclick="startSchedule()">Расписание</button>

<h3>Маршрут</h3>
<button onclick="finishRoute()">Завершить маршрут</button>

<hr>

<button onclick="saveData()">💾 Сохранить</button>
<button onclick="loadData()">📂 Загрузить</button>
<button onclick="clearAll()">Очистить всё</button>

</div>

<div class="bottom" id="status">Готово</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="app.js"></script>

</body>
</html>
