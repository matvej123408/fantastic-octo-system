<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Train Simulator</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { margin:0; font-family:Arial; }
#map { height:100vh; }

/* TOP BAR */
.topbar {
 position:absolute;
 top:0; left:0; right:0;
 height:50px;
 background:#222;
 display:flex;
 align-items:center;
 padding:5px;
 z-index:1000;
}
.topbar button {
 margin-right:5px;
 background:#444;
 color:white;
 border:none;
 padding:6px;
}

/* SIDEBAR */
.sidebar {
 position:absolute;
 top:50px;
 left:0;
 width:260px;
 bottom:0;
 background:#2b2b2b;
 color:white;
 padding:10px;
 z-index:1000;
 overflow:auto;
}

/* PANEL */
.panel input, .panel select {
 width:100%;
 margin-bottom:5px;
 padding:5px;
}

.panel button {
 width:100%;
 padding:6px;
 background:#555;
 color:white;
 border:none;
}

/* STATUS */
.bottom {
 position:absolute;
 bottom:0;
 left:260px;
 right:0;
 height:40px;
 background:#222;
 color:white;
 display:flex;
 align-items:center;
 padding-left:10px;
}
</style>

</head>
<body>

<div class="topbar">
<button onclick="setMode('station')">Станции</button>
<button onclick="setMode('track')">Рельсы</button>
<button onclick="setMode('signal')">Светофор</button>
<button onclick="setMode('route')">Маршрут</button>
</div>

<div class="sidebar">

<div class="panel">
<h3>Создание станции</h3>
<input id="stationName" placeholder="Название станции">
</div>

<div class="panel">
<h3>Поезда</h3>
<select id="routeSelect"></select>
<button onclick="spawnTrainUI()">Создать поезд</button>
<button onclick="startScheduleUI()">Расписание</button>
</div>

<div class="panel">
<h3>Маршрут</h3>
<button onclick="finishRoute()">Завершить маршрут</button>
</div>

<div class="panel">
<button onclick="saveData()">💾 Сохранить</button>
<button onclick="loadData()">📂 Загрузить</button>
<button onclick="clearAll()">Очистить всё</button>
</div>

</div>

<div class="bottom" id="status">Готово</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="app.js"></script>

</body>
</html>
