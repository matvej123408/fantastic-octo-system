<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Train Simulator</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { margin:0; font-family:Arial; }
#map { height:100vh; }

/* ===== TOP PANEL ===== */
.topbar {
 position:absolute;
 top:0;
 left:0;
 right:0;
 height:50px;
 background:#222;
 color:white;
 display:flex;
 align-items:center;
 padding:5px;
 z-index:1000;
}

.topbar button{
 margin-right:10px;
 padding:5px 10px;
 background:#444;
 color:white;
 border:none;
 cursor:pointer;
}

/* ===== SIDE MENU ===== */
.sidebar {
 position:absolute;
 top:50px;
 left:0;
 width:250px;
 bottom:0;
 background:#2b2b2b;
 color:white;
 padding:10px;
 z-index:1000;
 overflow:auto;
}

.sidebar h3 {
 margin-top:0;
}

.sidebar button {
 width:100%;
 margin-bottom:5px;
 padding:8px;
 background:#444;
 color:white;
 border:none;
 cursor:pointer;
}

/* ===== BOTTOM PANEL ===== */
.bottompanel {
 position:absolute;
 bottom:0;
 left:250px;
 right:0;
 height:60px;
 background:#222;
 color:white;
 display:flex;
 align-items:center;
 padding:10px;
 z-index:1000;
}
</style>

</head>
<body>

<div class="topbar">
<button onclick="toggleStation()">Станции</button>
<button onclick="toggleTrack()">Рельсы</button>
<button onclick="toggleSignal()">Светофор</button>
<button onclick="spawnTrain()">+ Поезд</button>
<button onclick="startSchedule()">Расписание</button>
<button onclick="saveData()">💾 Сохранить</button>
<button onclick="loadData()">📂 Загрузить</button>
</div>

<div class="sidebar">
<h3>Управление</h3>

<button onclick="clearAll()">Очистить всё</button>

<h3>Поезда</h3>
<div id="trainList"></div>

</div>

<div class="bottompanel">
<span id="status">Готово</span>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="app.js"></script>

</body>
</html>
